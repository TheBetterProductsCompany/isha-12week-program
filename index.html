<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>42 — ISHA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF6F1;
  --bg-warm: #F5EDE4;
  --surface: #FFFFFF;
  --surface-glass: rgba(255,255,255,.75);
  --glass-border: rgba(180,145,120,.12);
  --glass-border-strong: rgba(180,145,120,.22);
  --glass-hover: rgba(255,255,255,.85);
  --rose: #C6956B;
  --rose-light: #D4A97C;
  --rose-soft: rgba(198,149,107,.10);
  --rose-glow: rgba(198,149,107,.15);
  --brown: #3D2B1F;
  --brown-medium: #5C4033;
  --brown-light: #8B7355;
  --text: #3D2B1F;
  --text-secondary: #8B7355;
  --text-tertiary: #B5A18E;
  --border: rgba(180,145,120,.10);
  --border-light: rgba(180,145,120,.06);
  --green: #6B8F71;
  --green-soft: rgba(107,143,113,.10);
  --red: #C0544F;
  --red-soft: rgba(192,84,79,.08);
  --orange: #C4813B;
  --shadow-sm: 0 1px 4px rgba(61,43,31,.06);
  --shadow-md: 0 4px 20px rgba(61,43,31,.08);
  --shadow-lg: 0 8px 40px rgba(61,43,31,.10);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 18px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100%; -webkit-font-smoothing:antialiased;
  overflow-x:hidden; font-weight:400;
}

/* ════════════ LOGIN ════════════ */
#login {
  position:fixed; inset:0; z-index:9999;
  background:linear-gradient(165deg, #FAF6F1 0%, #F0E6DA 40%, #E8D5C4 100%);
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  transition:opacity .6s,transform .6s;
}
#login.out { opacity:0; pointer-events:none; transform:scale(1.02); }
.l-pre {
  font-family:'Inter',sans-serif; font-weight:300; font-size:10px; letter-spacing:8px;
  color:var(--text-tertiary); margin-bottom:44px; text-transform:uppercase;
}
.l-title {
  font-family:'Inter',sans-serif; font-weight:800; font-size:clamp(32px,9vw,56px);
  letter-spacing:4px; color:var(--brown); margin-bottom:6px; text-transform:uppercase;
}
.l-sub {
  font-family:'Inter',sans-serif; font-weight:300; font-size:11px; letter-spacing:6px;
  color:var(--text-tertiary); margin-bottom:48px; text-transform:uppercase;
}
#login input {
  width:280px; padding:16px 22px;
  background:rgba(255,255,255,.6); backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  color:var(--brown); font-family:'Montserrat',sans-serif; font-size:14px;
  letter-spacing:3px; text-align:center; outline:none; transition:all .3s;
}
#login input::placeholder { color:var(--text-tertiary); font-size:11px; letter-spacing:4px; }
#login input:focus { border-color:var(--rose); background:rgba(255,255,255,.8); }
.l-btn {
  margin-top:22px; padding:15px 52px;
  background:var(--brown); color:var(--bg); border-radius:980px;
  font-family:'Inter',sans-serif; font-weight:600; font-size:10px; letter-spacing:4px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .3s;
}
.l-btn:hover { opacity:.85; transform:translateY(-1px); }
.l-err {
  margin-top:16px; font-family:'Montserrat',sans-serif; font-size:11px;
  letter-spacing:1px; color:var(--red); opacity:0; transition:opacity .3s;
}
.l-err.on { opacity:1; }

/* ════════════ APP SHELL ════════════ */
#app { display:none; min-height:100vh; }
#app.on { display:block; }

/* ── STATUS BAR ── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; border-bottom:1px solid var(--border);
  flex-wrap:wrap; gap:10px; background:var(--surface);
}
.sb-left { display:flex; align-items:center; gap:16px; }
.live {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px; border-radius:980px;
  background:var(--green-soft); border:1px solid rgba(107,143,113,.15);
}
.live-dot {
  width:6px; height:6px; background:var(--green); border-radius:50%;
  box-shadow:0 0 8px rgba(107,143,113,.4); animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }
.live span {
  font-family:'Inter',sans-serif; font-weight:600; font-size:9px; letter-spacing:3px;
  color:var(--green); text-transform:uppercase;
}
.phase-tag {
  font-family:'Montserrat',sans-serif; font-size:10px; letter-spacing:2px;
  color:var(--text-tertiary); padding:6px 14px; border-radius:980px;
  border:1px solid var(--border); text-transform:uppercase;
}
.sb-right { display:flex; align-items:center; gap:20px; }
.clock {
  font-family:'Inter',sans-serif; font-weight:700; font-size:clamp(16px,3vw,22px);
  letter-spacing:2px; color:var(--brown); font-variant-numeric:tabular-nums; opacity:.6;
}
.date-display {
  font-family:'Montserrat',sans-serif; font-size:10px; letter-spacing:3px;
  color:var(--text-tertiary); text-transform:uppercase;
}

/* ── TOP NAV ── */
.top-nav {
  display:flex; align-items:center; justify-content:center;
  padding:12px 32px; gap:4px;
  border-bottom:1px solid var(--border);
  background:rgba(250,246,241,.85); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:sticky; top:0; z-index:50;
}
.nav-tab {
  padding:10px 24px; font-family:'Inter',sans-serif; font-weight:600; font-size:10px;
  letter-spacing:3px; color:var(--text-tertiary); cursor:pointer;
  border:none; border-radius:980px; background:transparent;
  text-transform:uppercase; transition:all .25s; white-space:nowrap;
}
.nav-tab:hover { color:var(--text-secondary); background:var(--rose-soft); }
.nav-tab.on { color:var(--brown); background:var(--surface); box-shadow:var(--shadow-sm); }

/* ── WEEK NAV ── */
.weeknav {
  display:flex; align-items:center; justify-content:center;
  gap:16px; padding:14px 32px; border-bottom:1px solid var(--border);
  background:var(--surface);
}
.wn-btn {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  background:var(--bg-warm); border:1px solid var(--border); border-radius:50%;
  color:var(--text-secondary); cursor:pointer; font-size:16px; transition:all .2s;
}
.wn-btn:hover { background:var(--surface); color:var(--brown); border-color:var(--glass-border-strong); }
.wn-label {
  font-family:'Inter',sans-serif; font-weight:700; font-size:12px; letter-spacing:3px;
  color:var(--brown); text-transform:uppercase;
}

/* ── DAY TABS ── */
.dtabs {
  display:flex; justify-content:center; padding:10px 20px; gap:4px;
  border-bottom:1px solid var(--border); background:var(--bg);
}
.dtab {
  padding:8px 14px; font-family:'Inter',sans-serif; font-weight:600; font-size:10px;
  letter-spacing:2px; color:var(--text-tertiary); cursor:pointer;
  border:none; border-radius:var(--radius-sm); background:transparent;
  text-transform:uppercase; transition:all .25s; white-space:nowrap;
}
.dtab:hover { color:var(--text-secondary); background:var(--rose-soft); }
.dtab.on { color:var(--brown); background:var(--surface); box-shadow:var(--shadow-sm); }
.dtab.done::after { content:'✓'; margin-left:5px; font-size:9px; color:var(--green); }

/* ── CONTENT ── */
.panel { display:none; padding:36px 32px; max-width:960px; margin:0 auto; }
.panel.on { display:block; }

/* ── DAY HEADER ── */
.dh-code {
  font-family:'Inter',sans-serif; font-weight:800; font-size:clamp(18px,3.5vw,26px);
  letter-spacing:3px; color:var(--brown); margin-bottom:20px; text-transform:uppercase;
}
.dh-meta { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px; }
.dh-m {
  padding:14px 18px; background:var(--surface);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
}
.dh-m-l {
  font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:2px;
  color:var(--text-tertiary); text-transform:uppercase; margin-bottom:4px;
}
.dh-m-v {
  font-family:'Inter',sans-serif; font-weight:700; font-size:12px; letter-spacing:1px;
  color:var(--brown);
}

/* ── SECTIONS ── */
.sec { margin-bottom:28px; }
.sec-h {
  font-family:'Inter',sans-serif; font-weight:700; font-size:11px; letter-spacing:4px;
  color:var(--rose); padding:14px 0 10px; margin-bottom:10px;
  text-transform:uppercase; border-bottom:1px solid var(--border);
}

/* ══════════ EXERCISE CARDS ══════════ */
.ex {
  display:flex; align-items:flex-start; padding:16px 18px; margin-bottom:6px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius); cursor:pointer; transition:all .3s ease;
  box-shadow:var(--shadow-sm);
}
.ex:hover { border-color:var(--glass-border-strong); box-shadow:var(--shadow-md); }
.ex.open { border-color:var(--rose); background:var(--surface); cursor:default; box-shadow:var(--shadow-md); }
.ex-dot {
  width:8px; height:8px; border:1.5px solid var(--text-tertiary);
  border-radius:50%; margin-top:6px; margin-right:14px; flex-shrink:0;
}
.ex.open .ex-dot { background:var(--rose); border-color:var(--rose); }
.ex-body { flex:1; }
.ex-name { font-family:'Montserrat',sans-serif; font-size:14px; font-weight:600; color:var(--brown); margin-bottom:3px; }
.ex-detail { font-family:'Montserrat',sans-serif; font-size:13px; color:var(--text-secondary); }
.ex-note { font-family:'Montserrat',sans-serif; font-size:11px; color:var(--text-tertiary); margin-top:4px; font-style:italic; }
.ex-source { font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:1px; color:var(--rose); margin-top:4px; text-transform:uppercase; opacity:.7; }
.ex-toggle {
  font-family:'Inter',sans-serif; font-weight:600; font-size:9px; letter-spacing:2px;
  color:var(--text-tertiary); opacity:.4; margin-top:6px; text-transform:uppercase;
  transition:opacity .2s;
}
.ex:hover .ex-toggle { opacity:.6; }
.ex.open .ex-toggle { display:none; }

/* ── SET ROWS ── */
.ex-sets { display:none; margin-top:12px; padding-top:10px; border-top:1px solid var(--border); }
.ex.open .ex-sets { display:block; }
.sets-hdr {
  display:grid; grid-template-columns:36px 1fr 1fr 1fr 48px 40px; gap:8px;
  margin-bottom:8px; padding-bottom:6px; align-items:center;
  border-bottom:1px solid var(--border-light);
}
.sets-hdr span {
  font-family:'Inter',sans-serif; font-weight:600; font-size:9px; letter-spacing:2px;
  color:var(--text-tertiary); text-transform:uppercase;
}
.sets-hdr .sh-c { text-align:center; }
.set-row {
  display:grid; grid-template-columns:36px 1fr 1fr 1fr 48px 40px; gap:8px;
  margin-bottom:6px; align-items:center;
}
.set-label {
  font-family:'Inter',sans-serif; font-weight:700; font-size:10px; letter-spacing:1px;
  color:var(--text-tertiary);
}
.set-target-wt {
  font-family:'Inter',sans-serif; font-weight:700; font-size:12px; letter-spacing:1px;
  color:var(--brown); opacity:.25; text-align:center; padding:10px 6px;
  background:var(--bg-warm); border:1px solid var(--border);
  border-radius:var(--radius-sm);
}
.set-input {
  width:100%; padding:10px 8px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Montserrat',sans-serif; font-size:13px;
  color:var(--brown); outline:none; text-align:center; transition:all .2s;
}
.set-input:focus { border-color:var(--rose); box-shadow:0 0 0 3px var(--rose-soft); }
.set-input::placeholder { color:var(--text-tertiary); font-size:11px; }
.pct-badge {
  display:flex; align-items:center; justify-content:center;
  font-family:'Inter',sans-serif; font-weight:700; font-size:10px; letter-spacing:.5px;
  padding:8px 4px; text-align:center; border-radius:var(--radius-sm); transition:all .3s;
}
.pct-badge.hit { background:var(--green-soft); color:var(--green); }
.pct-badge.miss { background:var(--red-soft); color:var(--red); }
.pct-badge.neutral { background:var(--bg-warm); color:var(--text-tertiary); }
.set-confirm {
  width:34px; height:34px; display:flex; align-items:center; justify-content:center;
  background:var(--bg-warm); border:1px solid var(--border); border-radius:50%;
  color:var(--text-tertiary); cursor:pointer; transition:all .25s; font-size:14px;
}
.set-confirm:hover { background:var(--surface); color:var(--brown); border-color:var(--rose); }
.set-confirm.saved { background:var(--green); color:#fff; border-color:var(--green); animation:confirmPop .3s; }
.set-confirm.failed { background:var(--red); color:#fff; border-color:var(--red); }
.set-confirm.saving { opacity:.3; pointer-events:none; }
@keyframes confirmPop { 0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)} }

/* ── NOTES ── */
.notes {
  margin-top:32px; padding:20px; background:var(--surface);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
}
.notes-h {
  font-family:'Inter',sans-serif; font-weight:700; font-size:10px; letter-spacing:3px;
  color:var(--rose); margin-bottom:12px; text-transform:uppercase;
}
.notes textarea {
  width:100%; min-height:70px; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:12px;
  font-family:'Montserrat',sans-serif; font-size:13px; color:var(--brown);
  resize:vertical; outline:none; line-height:1.7;
}
.notes textarea:focus { border-color:var(--rose); }
.notes textarea::placeholder { color:var(--text-tertiary); }

/* ── COMPLETE BTN ── */
.comp-btn {
  margin-top:24px; width:100%; padding:16px;
  background:var(--brown); color:var(--bg); border-radius:var(--radius);
  font-family:'Inter',sans-serif; font-weight:700; font-size:11px; letter-spacing:4px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .3s;
}
.comp-btn:hover { opacity:.85; transform:translateY(-1px); }
.comp-btn.done { background:var(--green); color:#fff; }

/* ── PLAN ── */
.ph-title {
  font-family:'Inter',sans-serif; font-weight:800; font-size:15px; letter-spacing:3px;
  color:var(--brown); margin-bottom:6px; text-transform:uppercase;
}
.ph-desc { font-family:'Montserrat',sans-serif; font-size:13px; color:var(--text-secondary); margin-bottom:18px; line-height:1.5; }
.pw-row {
  display:flex; align-items:center; padding:14px 18px; margin-bottom:5px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); cursor:pointer; transition:all .2s;
  box-shadow:var(--shadow-sm);
}
.pw-row:hover { border-color:var(--glass-border-strong); }
.pw-row.cur { border-color:var(--rose); background:var(--rose-soft); }
.pw-num { font-family:'Inter',sans-serif; font-weight:700; font-size:11px; letter-spacing:2px; color:var(--brown); width:80px; text-transform:uppercase; }
.pw-focus { font-family:'Montserrat',sans-serif; font-size:12px; color:var(--text-secondary); flex:1; }
.pw-status { font-family:'Montserrat',sans-serif; font-size:10px; color:var(--text-tertiary); }

/* ── STATS ── */
.sg { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.sc {
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm);
}
.sc-l { font-family:'Montserrat',sans-serif; font-size:9px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:6px; }
.sc-v { font-family:'Inter',sans-serif; font-weight:800; font-size:clamp(24px,4vw,32px); letter-spacing:1px; color:var(--brown); }
.sc-s { font-family:'Montserrat',sans-serif; font-size:11px; color:var(--text-tertiary); margin-top:3px; }
.prog-bar { width:100%; height:3px; background:var(--bg-warm); border-radius:2px; margin-top:10px; overflow:hidden; }
.prog-fill { height:100%; background:var(--rose); border-radius:2px; transition:width .5s; }

/* ── PRs ── */
.pr-title { font-family:'Inter',sans-serif; font-weight:800; font-size:14px; letter-spacing:3px; color:var(--brown); margin-bottom:16px; text-transform:uppercase; }
.pr-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 18px; margin-bottom:5px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); box-shadow:var(--shadow-sm);
}
.pr-name { font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; color:var(--brown); }
.pr-val { font-family:'Inter',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; color:var(--rose); }
.pr-form { display:flex; gap:12px; margin-top:20px; align-items:flex-end; flex-wrap:wrap; }
.pr-fg { display:flex; flex-direction:column; gap:5px; }
.pr-fg label { font-family:'Montserrat',sans-serif; font-size:10px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; }
.pr-fg input, .pr-fg select {
  padding:12px 16px; border:1px solid var(--border); background:var(--bg);
  border-radius:var(--radius-sm); font-family:'Montserrat',sans-serif; font-size:13px;
  color:var(--brown); outline:none; width:180px;
}
.pr-fg input:focus, .pr-fg select:focus { border-color:var(--rose); }
.pr-add {
  padding:12px 24px; background:var(--brown); color:var(--bg); border-radius:980px;
  font-family:'Inter',sans-serif; font-weight:700; font-size:9px; letter-spacing:2px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .2s;
}
.pr-add:hover { opacity:.85; }

/* ── CYCLE BANNER ── */
.cycle-banner {
  padding:16px 20px; margin-bottom:24px;
  background:var(--rose-soft); border:1px solid rgba(198,149,107,.15);
  border-radius:var(--radius); display:flex; align-items:flex-start; gap:12px;
}
.cycle-icon { font-size:18px; margin-top:2px; }
.cycle-txt { flex:1; }
.cycle-phase {
  font-family:'Inter',sans-serif; font-weight:700; font-size:11px; letter-spacing:2px;
  color:var(--rose); text-transform:uppercase; margin-bottom:4px;
}
.cycle-note { font-family:'Montserrat',sans-serif; font-size:12px; color:var(--brown-light); line-height:1.5; }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .status-bar{padding:12px 16px;}
  .top-nav{padding:8px 12px; gap:2px;}
  .nav-tab{padding:8px 14px; font-size:9px; letter-spacing:2px;}
  .dtabs{padding:6px 10px; gap:2px;}
  .dtab{padding:7px 10px; font-size:9px; letter-spacing:1px;}
  .panel{padding:20px 16px;}
  .sg{grid-template-columns:1fr;}
  .pr-form{flex-direction:column;}
  .pr-fg input,.pr-fg select{width:100%;}
  .weeknav{padding:10px 16px;}
  .set-row{grid-template-columns:30px 1fr 1fr 1fr 40px 34px;}
  .sets-hdr{grid-template-columns:30px 1fr 1fr 1fr 40px 34px;}
  .dh-meta{gap:6px;}
  .dh-m{padding:10px 14px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="l-pre">FOUNDATION PROTOCOL</div>
  <div class="l-title">42</div>
  <div class="l-sub">ISHA · 12 WEEK PROGRAM</div>
  <input type="password" id="pw" placeholder="ENTER CODE" autocomplete="off">
  <button class="l-btn" onclick="doLogin()">ACCESS</button>
  <div class="l-err" id="lerr">INCORRECT ACCESS CODE</div>
</div>

<!-- APP -->
<div id="app">
  <div class="status-bar">
    <div class="sb-left">
      <div class="live"><div class="live-dot"></div><span>Active</span></div>
      <div class="phase-tag" id="phaseTag">Month 1 · Week 1</div>
    </div>
    <div class="sb-right">
      <div class="clock" id="clock">00:00:00</div>
      <div class="date-display" id="dateDisp"></div>
    </div>
  </div>

  <div class="top-nav">
    <button class="nav-tab on" onclick="nav('today')" data-v="today">Today</button>
    <button class="nav-tab" onclick="nav('plan')" data-v="plan">Plan</button>
    <button class="nav-tab" onclick="nav('stats')" data-v="stats">Stats</button>
    <button class="nav-tab" onclick="nav('prs')" data-v="prs">PRs</button>
  </div>

  <div class="weeknav">
    <button class="wn-btn" onclick="chgWeek(-1)">‹</button>
    <span class="wn-label" id="weekLbl">Week 1 / 12</span>
    <button class="wn-btn" onclick="chgWeek(1)">›</button>
  </div>

// ═══════════════════════════════════════════════════════════
function getCyclePhase(w){
  // Simulate ~28 day cycle. Program starts Day 1 of cycle.
  const dayInProg = ((w-1)*7) + curDay;
  const cycleDay = (dayInProg % 28) + 1;
  if(cycleDay<=5) return {phase:'EARLY FOLLICULAR',day:cycleDay,note:'Autoregulate intensity. Permission to reduce load 5–10%. Core avoids high intra-abdominal pressure. Showing up is the win.',color:'var(--rose)'};
  if(cycleDay<=13) return {phase:'LATE FOLLICULAR',day:cycleDay,note:'PUSH window. Peak strength, best motor learning. Schedule progression attempts and new exercises here.',color:'var(--green)'};
  if(cycleDay<=16) return {phase:'OVULATION',day:cycleDay,note:'Strength high but joint laxity increases. Extra warm-up sets. Controlled tempos on single-leg work.',color:'var(--orange)'};
  return {phase:'LUTEAL',day:cycleDay,note:'Reduce volume 10–15% on lifting days. Lean into mobility/Pilates/yoga. Steady-state cardio preferred. Recovery focus.',color:'var(--brown-light)'};
}

const SB_URL='https://PLACEHOLDER.supabase.co';
const SB_KEY='PLACEHOLDER_KEY';

async function sb(endpoint,method,body){
  if(SB_URL.includes('PLACEHOLDER')) return null; // Skip until configured
  const opts={method:method||'GET',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}};
  if(method==='POST') opts.headers['Prefer']='resolution=merge-duplicates,return=representation';
  if(method==='PATCH') opts.headers['Prefer']='return=representation';
  if(body) opts.body=JSON.stringify(body);
  try{const r=await fetch(SB_URL+'/rest/v1/'+endpoint,opts);if(!r.ok)return null;const t=await r.text();return t?JSON.parse(t):[];}catch(e){return null;}
}

};

function isComplete(w,d){return !!_completions[w+'_'+d];}
function setCompletion(w,d,v){_completions[w+'_'+d]=v;save('completions',_completions);sb('completions?on_conflict=week_day','POST',{week_day:w+'_'+d,completed:!!v});}
function getNotes(w,d){return _notes[w+'_'+d]||'';}
function setNote(w,d,txt){_notes[w+'_'+d]=txt;save('notes',_notes);}
function getSetLog(eid){return _sets[eid]||{};}
function cacheSet(eid,s,f,v){if(!_sets[eid])_sets[eid]={};if(!_sets[eid][s])_sets[eid][s]={};_sets[eid][s][f]=v;_sets[eid][s].saved=false;save('sets',_sets);const btn=document.querySelector(`#sr_${eid}_${s} .set-confirm`);if(btn){btn.className='set-confirm';btn.textContent='↑';}}
async function confirmSet(eid,s,btn){const row=_sets[eid]&&_sets[eid][s];if(!row||(!row.wt&&!row.reps))return;btn.className='set-confirm saving';btn.textContent='…';_sets[eid][s].saved=true;save('sets',_sets);await sb('set_logs?on_conflict=eid,set_num','POST',{eid,set_num:parseInt(s),wt:String(row.wt||''),reps:String(row.reps||'')});btn.className='set-confirm saved';btn.textContent='✓';}
function getPRs(){return _prs;}
function setPR(name,val){_prs[name]=val;save('prs',_prs);}

function loadFromCache(){_completions=load('completions',{});_notes=load('notes',{});_sets=load('sets',{});_prs=load('prs',_prs);}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function updateClock(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Toronto'}));
  document.getElementById('clock').textContent=[now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  const dn=['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()];
  const mn=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][now.getMonth()];
  document.getElementById('dateDisp').textContent=dn+' '+String(now.getDate()).padStart(2,'0')+' · '+mn+' · '+now.getFullYear();
}

function calcCurrentWeek(){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'America/Toronto'}));
  const diff=now-PROG_START;
  if(diff<0) return{week:1,day:0};
  const td=Math.floor(diff/(1000*60*60*24));
  return{week:Math.min(Math.max(Math.floor(td/7)+1,1),12),day:Math.min(td%7,6)};
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderDayTabs(){
  const el=document.getElementById('dtabs');el.innerHTML='';
  DAYS.forEach((d,i)=>{const btn=document.createElement('button');btn.className='dtab'+(i===curDay?' on':'')+(isComplete(curWeek,i)?' done':'');btn.textContent=d;btn.onclick=()=>{curDay=i;renderAll();};el.appendChild(btn);});
}

function renderWorkout(){
  const p=document.getElementById('p-today');
  const data=getDayData(curWeek,curDay);
  if(!data){p.innerHTML='<div style="padding:40px;color:var(--text-tertiary)">Rest day.</div>';return;}

  const month=getMonth(curWeek);
  const mn=getMonthNum(curWeek);
  const cycle=getCyclePhase(curWeek);
  const spine=getSpineHygiene(curWeek);
  let h='';

  // Cycle banner
  h+=`<div class="cycle-banner"><div class="cycle-icon">☽</div><div class="cycle-txt"><div class="cycle-phase" style="color:${cycle.color}">Cycle Day ${cycle.day} — ${cycle.phase}</div><div class="cycle-note">${cycle.note}</div></div></div>`;

  // Day header
  h+=`<div class="dh-code">W${curWeek} — ${DAYNAMES[curDay]}</div>`;
  h+=`<div style="font-family:'Inter',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;color:var(--rose);margin-bottom:6px;text-transform:uppercase">${data.title}</div>`;
  h+=`<div class="dh-meta">`;
  h+=`<div class="dh-m"><div class="dh-m-l">Month</div><div class="dh-m-v">${mn} — ${month.n}</div></div>`;
  h+=`<div class="dh-m"><div class="dh-m-l">Focus</div><div class="dh-m-v">${data.focus}</div></div>`;
  h+=`<div class="dh-m"><div class="dh-m-l">Duration</div><div class="dh-m-v">${data.duration}</div></div>`;
  h+=`</div>`;

  // Daily Spine Hygiene (show on all days except class days)
  const isClassDay=(curDay===3||curDay===6);
  if(!isClassDay){
    h+=`<div class="sec"><div class="sec-h">DAILY SPINE HYGIENE · 10 MIN</div>`;
    spine.forEach((ex,i)=>{h+=exHTML(ex,'sh',i);});
    h+=`</div>`;
  }

  // Warmup
  if(data.warmup&&data.warmup.length){h+=`<div class="sec"><div class="sec-h">WARM-UP</div>`;data.warmup.forEach((ex,i)=>{h+=exHTML(ex,'wu',i);});h+=`</div>`;}

  // Main
  if(data.main&&data.main.length){h+=`<div class="sec"><div class="sec-h">MAIN WORK</div>`;data.main.forEach((ex,i)=>{h+=exHTML(ex,'mw',i);});h+=`</div>`;}

  // Conditioning
  if(data.conditioning&&data.conditioning.length){h+=`<div class="sec"><div class="sec-h">FINISHER / COOL-DOWN</div>`;data.conditioning.forEach((ex,i)=>{h+=exHTML(ex,'cn',i);});h+=`</div>`;}

  // Notes
  const note=getNotes(curWeek,curDay);
  h+=`<div class="notes"><div class="notes-h">SESSION NOTES</div><textarea placeholder="Log weights, RPE, pain level, how it felt…" onchange="setNote(${curWeek},${curDay},this.value)">${note}</textarea></div>`;

  // Complete
  const done=isComplete(curWeek,curDay);
  h+=`<button class="comp-btn${done?' done':''}" onclick="markComplete()" id="compBtn">${done?'SESSION COMPLETE ✓':'MARK SESSION COMPLETE'}</button>`;

  p.innerHTML=h;
}

function exHTML(ex,section,idx){
  const eid=`${curWeek}_${curDay}_${section}_${idx}`;
  const parsed=parseEx(ex.detail);
  const numSets=parsed.sets;
  const logged=getSetLog(eid);
  const isTime=/walk|stairmaster|interval|min|class/i.test(ex.name+' '+ex.detail)&&!/pull-apart|press|row|squat|bridge|dead bug|bird|plank|curl|stretch|pigeon|frog|cat|car|hip|roller|child|thread|y-t-w|prone|pallof|hollow|stir|wheel|windmill|pike|march|hover|inchworm|lunge|step|carry|thrust|push-up|chin|bench|pendlay|teaser|roll-up|face pull|band|scapular|open book|brettzel|figure|hamstring|hang|chop|lift|inverted/i.test(ex.name);

  let h=`<div class="ex" onclick="toggleEx(this,event)" data-eid="${eid}">`;
  h+=`<div class="ex-dot"></div><div class="ex-body">`;
  h+=`<div class="ex-name">${ex.name}</div>`;
  h+=`<div class="ex-detail">${ex.detail}</div>`;
  if(ex.note) h+=`<div class="ex-note">${ex.note}</div>`;
  if(ex.source) h+=`<div class="ex-source">${ex.source}</div>`;

  if(numSets>0&&!isTime){
    h+=`<div class="ex-toggle">TAP TO LOG</div>`;
    h+=`<div class="ex-sets" onclick="event.stopPropagation()">`;
    h+=`<div class="sets-hdr"><span>SET</span><span>PREV</span><span>WEIGHT</span><span>REPS</span><span class="sh-c">%</span><span class="sh-c"></span></div>`;

    for(let s=1;s<=numSets;s++){
      const sv=logged[s]||{};
      const prevEid=getPrevEid(eid);
      const prevLog=prevEid?getSetLog(prevEid):{};
      const prevSet=prevLog[s]||{};
      const prevTxt=prevSet.wt?(prevSet.wt+'×'+(prevSet.reps||'?')):'—';
      const isSaved=sv.saved;

      let pctClass='neutral',pctText='—';
      if(prevSet.wt&&sv.wt){
        const pctVal=Math.round((parseFloat(sv.wt)/parseFloat(prevSet.wt))*100);
        pctText=pctVal+'%';
        pctClass=pctVal>=100?'hit':pctVal>=90?'neutral':'miss';
      }

      h+=`<div class="set-row" id="sr_${eid}_${s}">`;
      h+=`<div class="set-label">S${s}</div>`;
      h+=`<div class="set-target-wt">${prevTxt}</div>`;
      h+=`<input class="set-input" type="number" inputmode="decimal" placeholder="lbs" value="${sv.wt||''}" data-eid="${eid}" data-set="${s}" data-prev="${prevSet.wt||0}" oninput="cacheSet('${eid}',${s},'wt',this.value);updPct(this)" onfocus="this.select()">`;
      h+=`<input class="set-input" type="number" inputmode="numeric" placeholder="${parsed.reps||'reps'}" value="${sv.reps||''}" oninput="cacheSet('${eid}',${s},'reps',this.value)" onfocus="this.select()">`;
      h+=`<div class="pct-badge ${pctClass}" data-eid="${eid}" data-set="${s}">${pctText}</div>`;
      h+=`<button class="set-confirm${isSaved?' saved':''}" onclick="confirmSet('${eid}',${s},this)">${isSaved?'✓':'↑'}</button>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

// Get previous week's same exercise ID for comparison
function getPrevEid(eid){
  const parts=eid.split('_');
  const prevWeek=parseInt(parts[0])-1;
  if(prevWeek<1) return null;
  return prevWeek+'_'+parts.slice(1).join('_');
}

function toggleEx(el,e){if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.classList.contains('pct-badge')||e.target.classList.contains('set-confirm'))return;el.classList.toggle('open');}

function parseEx(detail){
  if(!detail) return{sets:0,reps:0};
  let m=detail.match(/(\d+)\s*[x×]\s*(\d+)/i);
  if(m) return{sets:parseInt(m[1]),reps:parseInt(m[2])};
  m=detail.match(/(\d+)\s*[x×]/i);
  if(m) return{sets:parseInt(m[1]),reps:0};
  return{sets:0,reps:0};
}

function updPct(input){
  const eid=input.dataset.eid,s=input.dataset.set,prev=parseFloat(input.dataset.prev),actual=parseFloat(input.value);
  const badge=document.querySelector(`.pct-badge[data-eid="${eid}"][data-set="${s}"]`);
  if(!badge) return;
  if(prev>0&&actual>0){const pct=Math.round((actual/prev)*100);badge.textContent=pct+'%';badge.className='pct-badge '+(pct>=100?'hit':pct>=90?'neutral':'miss');}
  else{badge.textContent='—';badge.className='pct-badge neutral';}
}

function markComplete(){const done=!isComplete(curWeek,curDay);setCompletion(curWeek,curDay,done);renderAll();}

function renderPlan(){
  const p=document.getElementById('p-plan');let h='';
  MONTHS.forEach((mo,mi)=>{
    h+=`<div style="margin-bottom:24px;">`;
    h+=`<div class="ph-title">Month ${mi+1} — ${mo.n}</div>`;
    h+=`<div class="ph-desc">${mo.desc}</div>`;
    for(let w=mo.wks[0];w<=mo.wks[1];w++){
      const isCur=w===curWeek;
      const allDone=[0,1,2,3,4,5,6].every(d=>isComplete(w,d));
      h+=`<div class="pw-row${isCur?' cur':''}" onclick="curWeek=${w};curDay=0;nav('today')">`;
      h+=`<div class="pw-num">Week ${w}</div>`;
      h+=`<div class="pw-focus">${getMonth(w).n}</div>`;
      h+=`<div class="pw-status">${allDone?'✓ COMPLETE':isCur?'CURRENT':'—'}</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  p.innerHTML=h;
}

function renderStats(){
  const p=document.getElementById('p-stats');
  const comp=_completions;
  const total=Object.keys(comp).filter(k=>comp[k]).length;
  const possible=curWeek*7;
  const mn=getMonthNum(curWeek);

  let h=`<div class="ph-title" style="margin-bottom:16px;">PROGRAM STATISTICS</div>`;
  h+=`<div class="sg">`;
  h+=`<div class="sc"><div class="sc-l">Sessions Completed</div><div class="sc-v">${total}</div><div class="sc-s">of ${possible} possible</div></div>`;
  h+=`<div class="sc"><div class="sc-l">Current Week</div><div class="sc-v">${curWeek}</div><div class="sc-s">of 12 weeks</div></div>`;
  h+=`<div class="sc"><div class="sc-l">Month</div><div class="sc-v">${mn}</div><div class="sc-s">${getMonth(curWeek).n}</div></div>`;
  h+=`<div class="sc"><div class="sc-l">Completion Rate</div><div class="sc-v">${possible?Math.round(total/possible*100):0}%</div><div class="sc-s">consistency tracker</div></div>`;
  h+=`</div>`;

  // Pain Trend placeholder
  h+=`<div class="sc" style="margin-bottom:16px;"><div class="sc-l">Pain Trend</div><div class="sc-v" style="font-size:14px;">Log pain level (0–10) in session notes</div><div class="sc-s">AI engine will track rolling 4-week average</div></div>`;

  // Progression gates
  h+=`<div class="ph-title" style="margin-top:20px;margin-bottom:12px;">PROGRESSION GATES</div>`;
  const gates=[
    {name:'Goblet Squat → Barbell',gate:'Pain-free 3×10 at 25+ lb, full depth',month:3},
    {name:'SL-RDL → Barbell RDL',gate:'Freestanding 3×8 with 15+ lb DB',month:3},
    {name:'Sumo DL → Trap Bar DL',gate:'Clean 3×8 from elevated surface',month:3},
    {name:'Push-Up → DB Bench',gate:'3×12 flat push-ups, chest to floor',month:3},
    {name:'Stir-the-Pot → Ab Wheel',gate:'3×8 circles from toes, no sag',month:3},
    {name:'Side Plank Knees → Feet',gate:'3×15s from knees, no hip drop',month:2},
    {name:'Dead Bug Arms → Full',gate:'3×8/side arms-only, low back pinned',month:2},
  ];
  gates.forEach(g=>{
    const unlocked=mn>=g.month;
    h+=`<div class="pr-row"><div class="pr-name" style="font-size:12px;">${g.name}</div><div style="font-size:10px;color:${unlocked?'var(--green)':'var(--text-tertiary)'}">${unlocked?'AVAILABLE':'Month '+g.month}</div></div>`;
    h+=`<div style="font-size:11px;color:var(--text-tertiary);padding:4px 18px 10px;background:var(--bg)">${g.gate}</div>`;
  });

  p.innerHTML=h;
}

function renderPRs(){
  const p=document.getElementById('p-prs');
  const prs=getPRs();
  let h=`<div class="pr-title">PERSONAL RECORDS</div>`;
  Object.keys(prs).forEach(lift=>{
    h+=`<div class="pr-row"><div class="pr-name">${lift}</div><div class="pr-val">${prs[lift]?prs[lift]+' lbs':'—'}</div></div>`;
  });
  h+=`<div style="margin-top:20px;"><div class="pr-title" style="font-size:9px;">UPDATE A PR</div>`;
  h+=`<div class="pr-form">`;
  h+=`<div class="pr-fg"><label>Exercise</label><select id="prSel">`;
  Object.keys(prs).forEach(l=>{h+=`<option value="${l}">${l}</option>`;});
  h+=`</select></div>`;
  h+=`<div class="pr-fg"><label>Weight (lbs)</label><input type="number" id="prWt" placeholder="0"></div>`;
  h+=`<button class="pr-add" onclick="addPR()">UPDATE PR</button>`;
  h+=`</div></div>`;
  p.innerHTML=h;
}
function addPR(){const s=document.getElementById('prSel'),w=document.getElementById('prWt');if(s&&w&&w.value){setPR(s.value,parseInt(w.value));renderPRs();renderStats();}}

function renderAll(){
  const month=getMonth(curWeek);const mn=getMonthNum(curWeek);
  document.getElementById('phaseTag').textContent=`Month ${mn} · Week ${curWeek}`;
  document.getElementById('weekLbl').textContent=`Week ${curWeek} / 12`;
  renderDayTabs();renderWorkout();renderPlan();renderStats();renderPRs();
}

function nav(view){
  curView=view;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('on',b.dataset.v===view));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+view).classList.add('on');
  if(view==='today') renderWorkout();
}

function chgWeek(dir){curWeek=Math.min(Math.max(curWeek+dir,1),12);curDay=0;renderAll();}

async function startApp(){
  loadFromCache();
  const c=calcCurrentWeek();curWeek=c.week;curDay=c.day;
  updateClock();setInterval(updateClock,1000);
  renderAll();
}
</script>
